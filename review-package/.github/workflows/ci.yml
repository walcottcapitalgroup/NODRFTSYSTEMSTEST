name: Validate and Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install validators
        run: npm install -g html-validate stylelint eslint@8 lhci/cli@0.14.x

      - name: HTML Validate
        run: html-validate --config .htmlvalidate.json index.html pages/*.html || true

      - name: CSS Lint
        run: stylelint "src/css/styles.css" --config .stylelintrc.json || true

      - name: JS Lint
        run: eslint "src/js/*.js" --config .eslintrc.json || true

      - name: Link Check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir . --exclude-all-private --no-progress --timeout 10 index.html pages/*.html
        continue-on-error: true

      - name: Lighthouse CI
        run: |
          npm install -g http-server
          http-server . -p 8080 &
          sleep 2
          lhci autorun --config=lighthouserc.json
        continue-on-error: true
