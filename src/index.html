<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoDrftSystems</title>
  <meta name="robots" content="noindex, nofollow">
  <script>
    (function () {
      const target = new URL('../index.html', window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    }());
  </script>
</head>
<body>
  <main style="font-family: Inter, Arial, sans-serif; padding: 2rem; color: #111;">
    <p>Redirecting to the site root...</p>
    <p><a id="root-link" href="../index.html">Open the site</a></p>
  </main>
  <script>
    (function () {
      const link = document.getElementById('root-link');
      if (!link) return;

      const target = new URL('../index.html', window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      link.href = target.toString();
    }());
  </script>
</body>
</html>
